spring.datasource.url=jdbc:postgresql://db:5432/reminderdb
spring.datasource.username=reminderuser
spring.datasource.password=reminderpass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.jwt.secret=ThisIsAVeryLongSecretKeyForJWTTokenGenerationPleaseChangeThis123456
app.jwt.expiration=86400000

server.port=8080
